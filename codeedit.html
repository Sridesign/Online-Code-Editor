<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Code Editor</title>
  <link rel="stylesheet" href="index.css">
  <script src="script.js"></script>
</head>

<body>
  <div class="code-area">
    <textarea id="htmlCode" placeholder="HTML Code"></textarea>
    <textarea id="cssCode" placeholder="CSS Code"></textarea>
    <textarea id="jsCode" placeholder="JavaScript Code"></textarea>
  </div>
  <div class="preview-area">
    <iframe id="preview-window"></iframe>
  </div>
  <div class="outputbox">
    <button onclick="outputframe()" class="buton">RUN</button>
  </div>
</body>

</html>
