<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="reg.css">
  <title>Registration Form</title>
</head>
<body>

<!-- Container Start -->
<div id="container">
    <!-- Form Wrap Start -->
    <div class="form-wrap">
      <h1>Register</h1>
      <p>It's Free and Only takes a minute</p>
      <!-- Form Start -->
      <form name="form1" action="register.php" method="POST">


        <div class="form-group">
          <label for="User-name">User Name</label>
          <input type="text" name="uid" id="first-name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" name="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" name="pass" id="first-name" required>
        </div>
        <div class="form-group">
          <label for="cpass">Confirm Password</label>
          <input type="password" name="repass" id="first-name" required>
        </div>
        <button type="submit" name="submit" value="Register!">Register!</button>
        <p class="bottom-text">
          By Clicking the Register! Button, you agree to our
          <a href="#">Term & Conditions</a> and <a href="#">Primary Policy</a>
        </p>
      </form>
      <!-- Form Close -->
    </div>
    <!-- Form Wrap Close -->
    <footer>
      <p>Already Have an Account? <a href="login.html">Login Here</a></p>
    </footer>
  </div>
  <!-- Container Close -->

</body>
</html>
